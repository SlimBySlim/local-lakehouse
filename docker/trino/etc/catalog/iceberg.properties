connector.name=iceberg

iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=local_lakehouse
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/lakehouse
iceberg.jdbc-catalog.connection-user=lakehouse
iceberg.jdbc-catalog.connection-password=lakehouse
iceberg.jdbc-catalog.default-warehouse-dir=s3://raw/iceberg

fs.s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin