services:
  postgres:
    image: postgres:16
    container_name: lakehouse-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    env_file:
      - .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  trino:
    image: trinodb/trino:latest
    container_name: lakehouse-trino
    ports:
      - "8080:8080"
    volumes:
      - ./docker/trino/etc:/etc/trino
    depends_on:
      - minio
      - postgres

  airflow-postgres:
    image: postgres:16
    container_name: lakehouse-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: lakehouse-airflow:latest
    container_name: lakehouse-airflow
    depends_on:
      - airflow-postgres
      - minio
      - trino
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW_UID: 50000
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./logs/airflow:/opt/airflow/logs
      - ./dbt:/opt/airflow/dbt
      - ./dbt/profiles.yml:/home/airflow/.dbt/profiles.yml
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com || true &&
      airflow scheduler & airflow webserver
      "

volumes:
  postgres_data:
  minio_data:
  airflow_postgres_data:
